<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Fame | صحيفة الريفيري</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

        /* --- نظام الثيمات الديناميكي المتغير --- */
        :root {
            /* الافتراضي: الممر الشرفي (أزرق مشع) */
            --bg-color: #051329;
            --globe-base: #071a30;
            --accent-color: #3b82f6;
            --glow-color: rgba(59, 130, 246, 0.6);
            --text-main: #ffffff;
            --card-bg: rgba(11, 30, 54, 0.8);
        }

        body[data-theme="gorosei"] {
            /* قاعة الحكماء (أبيض يلمع) */
            --bg-color: #121212;
            --globe-base: #1a1a1a;
            --accent-color: #ffffff;
            --glow-color: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body[data-theme="yonko"] {
            /* قاعة الأباطرة (أسود مرعب) */
            --bg-color: #050505;
            --globe-base: #110303;
            --accent-color: #ff3333;
            --glow-color: rgba(255, 0, 0, 0.6);
            --card-bg: rgba(20, 0, 0, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background-color 0.8s ease;
        }

        /* --- الهيدر وتصميم الكوكب الشبكي الجديد 🌐 --- */
        header { text-align: center; padding: 40px 20px; position: relative; border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { color: var(--accent-color); font-size: 3rem; font-weight: 900; text-shadow: 0 0 15px var(--glow-color); transition: color 0.8s, text-shadow 0.8s; margin-bottom: 5px; }
        header .subtitle { font-size: 1.2rem; color: #ccc; }
        header .founder { margin-top: 10px; font-size: 0.9rem; color: #aaa; }
        header .founder strong { color: var(--accent-color); transition: color 0.8s; }

        /* حاوية الكوكب الشبكي 🌐 */
        .globe-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px auto;
            width: 140px;
            height: 140px;
            position: relative;
        }

        /* أنيميشن وتصميم الشبكة الذكية */
        .network-globe {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px var(--glow-color));
            transition: filter 0.8s ease;
            animation: rotateGlobe 12s linear infinite;
        }

        .globe-bg {
            fill: var(--globe-base);
            transition: fill 0.8s ease;
        }

        .globe-line {
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 1.5;
            opacity: 0.75;
            transition: stroke 0.8s ease;
        }

        /* حركة دوران كروية هادئة حول المركز */
        @keyframes rotateGlobe {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- الأزرار --- */
        .nav-container { display: flex; justify-content: center; gap: 15px; margin: 30px auto; flex-wrap: wrap; padding: 0 20px; }
        .nav-btn {
            background-color: transparent; border: 1px solid var(--accent-color); color: var(--accent-color);
            padding: 12px 30px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border-radius: 8px;
            transition: all 0.4s ease;
        }
        .nav-btn:hover, .nav-btn.active {
            background-color: var(--accent-color); color: #000; box-shadow: 0 0 20px var(--glow-color);
        }

        /* --- عناوين وشروحات الأقسام --- */
        .section-header { text-align: center; margin-bottom: 40px; padding-bottom: 15px; }
        .section-header h2 { font-size: 2.5rem; color: var(--accent-color); text-shadow: 0 0 10px var(--glow-color); margin-bottom: 8px; transition: color 0.8s; }
        .section-header p { font-size: 1.2rem; color: #ddd; font-weight: 500; display: inline-block; padding: 5px 20px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }

        /* --- المحتوى والبوسترات الفخمة --- */
        .main-content { flex: 1; max-width: 1100px; width: 100%; margin: 0 auto; padding: 20px; }
        .section-panel { display: none; }
        .section-panel.active { display: block; animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 30px; }

        .character-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            overflow: hidden; cursor: pointer; position: relative; transition: all 0.4s ease; height: 380px;
            display: flex; flex-direction: column;
        }
        .character-card:hover { transform: translateY(-10px); border-color: var(--accent-color); box-shadow: 0 10px 30px var(--glow-color); }

        .card-img-wrapper { height: 65%; width: 100%; overflow: hidden; position: relative; }
        .card-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .character-card:hover .card-img-wrapper img { transform: scale(1.1); }

        .card-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s;
        }
        .character-card:hover .card-overlay { opacity: 1; }
        .card-overlay span { background: var(--accent-color); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; }

        .card-info { padding: 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-info h3 { color: var(--accent-color); font-size: 1.3rem; margin-bottom: 5px; }
        .card-info p { color: #aaa; font-size: 0.9rem; }

        /* --- النافذة المنبثقة (الملف الشخصي الفاخر) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-content {
            background: var(--bg-color); border: 2px solid var(--accent-color); box-shadow: 0 0 50px var(--glow-color);
            border-radius: 15px; width: 90%; max-width: 800px; display: flex; flex-wrap: wrap; overflow: hidden;
            transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .modal-img { flex: 1; min-width: 300px; height: 500px; }
        .modal-img img { width: 100%; height: 100%; object-fit: cover; border-left: 2px solid var(--accent-color); }

        .modal-details { flex: 1; min-width: 300px; padding: 40px 30px; display: flex; flex-direction: column; }
        .modal-details h2 { color: var(--accent-color); font-size: 2.2rem; margin-bottom: 10px; }
        .modal-details .role-badge { display: inline-block; background: var(--accent-color); color: #000; padding: 5px 15px; border-radius: 5px; font-weight: bold; margin-bottom: 25px; align-self: flex-start; }
        .modal-details p { color: #ddd; line-height: 1.8; font-size: 1.1rem; overflow-y: auto; flex: 1; margin-bottom: 20px; }
        
        .close-btn {
            position: absolute; top: 15px; right: 15px; background: red; color: white; border: none;
            width: 35px; height: 35px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; font-weight: bold; z-index: 10;
        }

        @media (max-width: 700px) {
            .modal-img { height: 250px; }
            .modal-details { padding: 20px; }
            .modal-details h2 { font-size: 1.6rem; }
            .section-header h2 { font-size: 2rem; }
        }
    </style>
</head>
<body data-theme="gorosei">

    <header>
        <div class="globe-wrapper">
            <svg class="network-globe" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="46" class="globe-bg"/>
                <circle cx="50" cy="50" r="46" class="globe-line"/>
                <line x1="4" y1="50" x2="96" y2="50" class="globe-line"/>
                <line x1="15" y1="25" x2="85" y2="25" class="globe-line"/>
                <line x1="15" y1="75" x2="85" y2="75" class="globe-line"/>
                <line x1="50" y1="4" x2="50" y2="96" class="globe-line"/>
                <path d="M50,4 Q23,50 50,96" class="globe-line"/>
                <path d="M50,4 Q77,50 50,96" class="globe-line"/>
                <path d="M50,4 Q3,50 50,96" class="globe-line"/>
                <path d="M50,4 Q97,50 50,96" class="globe-line"/>
            </svg>
        </div>
        <h1>Hall of Fame</h1>
        <div class="subtitle">المنصة الرسمية لصحيفة الريفيري</div>
        <div class="founder">المؤسس: <strong>اشورا</strong> | التصميم: <strong>لابوبو</strong></div>
    </header>

    <div class="nav-container">
        <button class="nav-btn active" onclick="switchSection('gorosei', 'gorosei', event)">قاعة الحكماء</button>
        <button class="nav-btn" onclick="switchSection('yonko', 'yonko', event)">قاعة الأباطرة</button>
        <button class="nav-btn" onclick="switchSection('admins', 'admins', event)">الممر الشرفي</button>
    </div>

    <div class="main-content">
        <div id="gorosei" class="section-panel active">
            <div class="section-header">
                <h2>قاعة الحكماء</h2>
                <p>— للغوروسي —</p>
            </div>
            <div class="cards-grid" id="gorosei-box"></div>
        </div>

        <div id="yonko" class="section-panel">
            <div class="section-header">
                <h2>قاعة الأباطرة</h2>
                <p>— لليونكو —</p>
            </div>
            <div class="cards-grid" id="yonko-box"></div>
        </div>

        <div id="admins" class="section-panel">
            <div class="section-header">
                <h2>الممر الشرفي</h2>
                <p>— للسوبر نوفا —</p>
            </div>
            <div class="cards-grid" id="admins-box"></div>
        </div>
    </div>

    <div class="modal-overlay" id="profile-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal(event)">X</button>
            <div class="modal-img">
                <img id="m-img" src="" alt="صورة الشخصية">
            </div>
            <div class="modal-details">
                <h2 id="m-name">الاسم</h2>
                <div class="role-badge" id="m-role">الرتبة</div>
                <p id="m-desc">الوصف والقصة الكاملة...</p>
            </div>
        </div>
    </div>

    <script>
        // --- قاعدة البيانات الثابتة ---
        const database = {
            gorosei: [
                { 
                    name: "سانت نوسجورو", 
                    role: "محارب العدالة المالية", 
                    short: "المدير المالي للحكومة",
                    fullInfo: "يمثل سانت نوسجورو القوة المالية المطلقة في المنصة. يتميز بسيفه القاطع وحكمته الاقتصادية التي تضمن استقرار الموارد وتوجيهها بدقة عالية نحو أهداف الصحيفة الكبرى. قليل الكلام لكن أفعاله تهز الأسواق.",
                    img: "https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?auto=format&fit=crop&w=600&q=80" 
                },
                { 
                    name: "سانت ماركوس مارس", 
                    role: "محارب العدالة البيئية", 
                    short: "مسؤول النشر والبيئة",
                    fullInfo: "يحلق فوق الجميع بنظرته الثاقبة. يدير الشؤون البيئية والنشر الداخلي بقبضة من حديد. يحرص على أن تكون بيئة الصحيفة خالية من الفساد والشوائب، محلقاً كطائر أسطوري يحمي سماء المنصة.",
                    img: "https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?auto=format&fit=crop&w=600&q=80" 
                }
            ],
            yonko: [
                { 
                    name: "شانكس 'ذو الشعر الأحمر'", 
                    role: "إمبراطور البحر 👑👑👑", 
                    short: "صاحب الهاكي الملكي",
                    fullInfo: "أحد أقوى الأباطرة في العالم الجديد وصاحب حضور مرعب. لا يحتاج لفاكهة شيطان لإثبات قوته. حافظ على لقبه الإداري والفني لـ 3 فترات متتالية، مما يجعله أسطورة حية في أروقة قاعة الشهرة.",
                    img: "https://images.unsplash.com/photo-1509909756405-be0199881695?auto=format&fit=crop&w=600&q=80" 
                },
                { 
                    name: "مارشال دي تيتش", 
                    role: "إمبراطور الظلام 👑👑", 
                    short: "متحكم بفاكهتين",
                    fullInfo: "شخصية ماكرة وقوية، استطاع التربع على عرش الأباطرة لـ فترتين متتاليتين. يمثل الجانب المظلم والمرعب من السلطة، ولا يتوانى عن سحق أي عقبة تقف في طريق طموحه اللا متناهي.",
                    img: "https://images.unsplash.com/photo-1505567745926-ba89000d255a?auto=format&fit=crop&w=600&q=80" 
                }
            ],
            admins: [
                { 
                    name: "إداري أول السوبر نوفا", 
                    role: "رئيس الجيل الأسوأ", 
                    short: "المسؤول التنفيذي",
                    fullInfo: "قائد محنك من الجيل الجديد، يشرف على متابعة وتنظيم شؤون الأعضاء بدقة. يعتبر الدينامو المحرك لعمليات صحيفة الريفيري ويضمن تطبيق القوانين بروح الشباب المتوقدة.",
                    img: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=600&q=80" 
                }
            ]
        };

        function renderCards(category, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = database[category].map((item, index) => `
                <div class="character-card" onclick="openProfile('${category}', ${index})">
                    <div class="card-img-wrapper">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="card-overlay"><span>استعراض الملف</span></div>
                    </div>
                    <div class="card-info">
                        <h3>${item.name}</h3>
                        <p>${item.short}</p>
                    </div>
                </div>
            `).join('');
        }

        function initWebsite() {
            renderCards('gorosei', 'gorosei-box');
            renderCards('yonko', 'yonko-box');
            renderCards('admins', 'admins-box');
        }

        function switchSection(sectionId, themeName, event) {
            // تغيير الثيم العام والـ SVG بالتبعية تلقائياً
            document.body.setAttribute('data-theme', themeName);

            document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(sectionId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openProfile(category, index) {
            const data = database[category][index];
            document.getElementById('m-img').src = data.img;
            document.getElementById('m-name').innerText = data.name;
            document.getElementById('m-role').innerText = data.role;
            document.getElementById('m-desc').innerText = data.fullInfo;
            
            document.getElementById('profile-modal').classList.add('active');
        }

        function closeModal(event) {
            if (event.target === document.getElementById('profile-modal') || event.target.classList.contains('close-btn')) {
                document.getElementById('profile-modal').classList.remove('active');
            }
        }

        window.onload = initWebsite;
    </script>
</body>
</html>
